name: ✅ Testes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  testes:
    name: Rodar testes unitários
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Instala o .NET 8
      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3. Lista os arquivos para debug (remove após confirmar que funciona)
      - name: Listar estrutura do projeto
        run: find . -name "*.csproj" | sort

      # 4. Restaura as dependências da API
      - name: Restaurar dependências da API
        run: dotnet restore AutoManager.API.csproj

      # 5. Compila o projeto
      - name: Build
        run: dotnet build AutoManager.API.csproj --no-restore --configuration Release
