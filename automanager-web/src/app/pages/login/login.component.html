<div class="auth-wrap">
  <div class="auth-card card">
    <div class="auth-logo">
      <span class="logo-icon">🚗</span>
      <h1>AutoManager</h1>
      <p>Gestão de ordens de serviço</p>
    </div>

    <div *ngIf="erro" class="alert alert-error">{{ erro }}</div>

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>E-mail</label>
        <input class="form-control" type="email" [(ngModel)]="email"
               name="email" placeholder="voce@email.com" required />
      </div>

      <div class="form-group" style="margin-top:14px">
        <label>Senha</label>
        <input class="form-control" type="password" [(ngModel)]="senha"
               name="senha" placeholder="••••••••" required />
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:20px"
              type="submit" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-link">Não tem conta? <a routerLink="/register">Cadastre-se</a></p>
  </div>
</div>
